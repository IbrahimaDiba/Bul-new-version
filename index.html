<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball University League | BUL HOOPS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; background-color: #0f172a; height: 100vh; }
        .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(220, 38, 38, 0.3); border-top: 4px solid #dc2626; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .title { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin: 0; line-height: 1.2; }
        .red-text { color: #dc2626; }
        .subtitle { color: #9ca3af; margin-top: 1rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <h1 class="title">Basketball<br/><span class="red-text">University</span><br/>League</h1>
        <p class="subtitle">Loading Data...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
